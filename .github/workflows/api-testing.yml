name: API Automation Pipeline

on:
  push:
    branches:
      - main

jobs:

  functional-testing:

    runs-on: self-hosted

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Newman
        run: npm install -g newman newman-reporter-html

      - name: Create Reports Folder
        run: mkdir reports

      - name: Run Postman Collection
        run: >
          newman run postman/UltivisionApi.postman_collection.json
          -r cli,html
          --reporter-html-export reports/newman-report.html

  performance-testing:

    runs-on: self-hosted

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install k6
        run: choco install k6 -y

      - name: Run k6 Test
        run: |
          k6 run k6/soak-test.js