name: API Automation Pipeline

on:
  push:
    branches:
      - main

jobs:

  functional-testing:

    runs-on: self-hosted

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Newman
        run: npm install -g newman newman-reporter-html

      - name: Create Reports Folder
        run: mkdir reports

      - name: Show Repository Files
        run: dir

      - name: Show Postman Folder
        run: dir postman

- name: Run Postman Collection
  run: |
    newman run postman/UltivisionApi.postman_collection.json `
    --timeout-request 30000 `
    --delay-request 100 `
    -r cli,html `
    --reporter-html-export reports/newman-report.html

performance-testing:

  runs-on: self-hosted

  steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Install k6
      run: choco install k6 -y

    - name: Show Current Directory
      run: pwd

    - name: Show k6 Files
      run: dir k6

    - name: Run k6 Test
      run: |
        k6 run .\k6\soak-test.js

 - name: Show Current Directory
  run: pwd

- name: Show k6 Files
  run: dir k6

- name: Run k6 Test
  run: |
    k6 run .\k6\soak-test.js